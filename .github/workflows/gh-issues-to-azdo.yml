name: Issue Created Handler

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]

jobs:
  handle-new-issue:
    if: github.event_name == 'issues'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Install Python Markdown
        run: pip install markdown Pillow bleach

      - name: Determine Work Item Type
        id: determine-work-item-type
        uses: actions/github-script@v6
        with:
          script: |
            const labels = context.payload.issue.labels.map(label => label.name.toLowerCase());
            let workItemType = "";
            if (labels.includes("bug")) {
              workItemType = "Bug";
            } else if (labels.includes("enhancement")) {
              workItemType = "User Story";
            } else {
              workItemType = "Customer Escalation";
            }
            const encodedType = encodeURIComponent(workItemType);
            core.setOutput('display_type', workItemType);
            return encodedType;
          result-encoding: string

      - name: Create work item in Azure DevOps
        id: create-work-item
        env:
          AZDO_ORG: ${{ secrets.AZDO_ORG }}
          AZDO_PROJECT: ${{ secrets.AZDO_PROJECT }}
          AZURE_DEVOPS_TOKEN: ${{ secrets.AZURE_DEVOPS_TOKEN }}
          AZDO_AREA_PATH: ${{ secrets.AZDO_AREA_PATH }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          WORK_ITEM_TYPE: ${{ steps.determine-work-item-type.outputs.result }}
        run: |
          echo "Creating Azure DevOps work item for GitHub Issue: $ISSUE_TITLE"

          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | sed -E 's/\s*\[AzDO Work Item:[^\]]*\]//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')
          echo "Cleaned title: $CLEAN_TITLE"

          printf '%s' "$ISSUE_BODY" > /tmp/issue_body.md

          cat << 'PYEOF' > /tmp/convert_md.py
          import markdown, re, html, bleach

          # Allowed tags and attributes for bleach sanitization
          ALLOWED_TAGS = [
              'p', 'br', 'strong', 'em', 'ul', 'ol', 'li',
              'a', 'img', 'code', 'pre', 'blockquote',
              'h1', 'h2', 'h3', 'h4', 'h5', 'h6',
          ]
          ALLOWED_ATTRS = {
              'a':   ['href', 'title'],
              'img': ['src', 'alt', 'title'],
          }

          with open("/tmp/issue_body.md", "r") as f:
              raw = f.read()

          # Insert blank line BEFORE **bold** headings
          raw = re.sub(r'\n(\*\*[^\n]+\*\*\n)', r'\n\n\1', raw)

          # Insert blank line AFTER **bold** headings
          raw = re.sub(r'(\*\*[^\n]+\*\*)\n(?!\n)', r'\1\n\n', raw)

          # Insert blank line before numbered list blocks so markdown recognises them as <ol>
          # (intro lines like "Steps to reproduce:" directly before "1." cause inline rendering)
          raw = re.sub(r'([^\n])\n(1\. )', r'\1\n\n\2', raw)

          # Insert blank line before unordered list blocks for the same reason
          raw = re.sub(r'([^\n])\n([-*] )', r'\1\n\n\2', raw)

          html_out = markdown.markdown(raw, extensions=['sane_lists'])

          # Sanitize: strip disallowed tags/attributes (removes <script>, <iframe>, etc.)
          html_out = bleach.clean(html_out, tags=ALLOWED_TAGS, attributes=ALLOWED_ATTRS, strip=True)

          # Strip <p> tags inside <li> elements (caused when blank lines exist between items)
          html_out = re.sub(r'<li>\s*<p>(.*?)</p>\s*</li>', r'<li>\1</li>', html_out, flags=re.DOTALL)

          # Convert bold headings to block-safe HTML
          html_out = re.sub(r'<strong>([^<]+)</strong>', r'<br/><strong>\1</strong>', html_out)

          # Convert ordered lists - one line per item, no extra spacing
          def replace_ol(match):
              items = re.findall(r'<li>(.*?)</li>', match.group(0), re.DOTALL)
              return ''.join(f'{i}. {item.strip()}<br/>' for i, item in enumerate(items, 1))

          html_out = re.sub(r'<ol>(.*?)</ol>', replace_ol, html_out, flags=re.DOTALL)

          # Convert unordered lists - one line per item, no extra spacing
          def replace_ul(match):
              items = re.findall(r'<li>(.*?)</li>', match.group(0), re.DOTALL)
              return ''.join(f'&bull; {item.strip()}<br/>' for item in items)

          html_out = re.sub(r'<ul>(.*?)</ul>', replace_ul, html_out, flags=re.DOTALL)

          # Convert paragraphs
          html_out = re.sub(r'<p>(.*?)</p>', r'\1<br/>', html_out, flags=re.DOTALL)

          # Clean up excessive line breaks
          html_out = re.sub(r'(<br/>){3,}', '<br/><br/>', html_out)

          def replace_img(match):
              src = re.search(r'src="([^"]+)"', match.group(0))
              alt = re.search(r'alt="([^"]+)"', match.group(0))
              src_val = src.group(1) if src else ""
              alt_val = html.escape(alt.group(1) if alt else "image")
              return f"__IMG_PLACEHOLDER__{src_val}__ALT__{alt_val}__END__"

          print(re.sub(r"<img[^>]*>", replace_img, html_out), end="")
          PYEOF

          FORMATTED_ISSUE_BODY=$(python3 /tmp/convert_md.py)

          PATCH_DOC=$(jq -n \
            --arg title "GitHub Issue #$ISSUE_NUMBER: $CLEAN_TITLE" \
            --arg issueNumber "$ISSUE_NUMBER" \
            --arg issueUrl "$ISSUE_URL" \
            --arg bodyHtml "$FORMATTED_ISSUE_BODY" \
            --arg areaPath "$AZDO_AREA_PATH" \
            '"<div><p><strong>ISSUE DETAILS:</strong></p><p>Issue Number: \($issueNumber)</p><p><a href=\"\($issueUrl)\">View Issue on GitHub</a></p><div>\($bodyHtml)</div><p style=\"color:red;\"><strong>NOTE:</strong> Please ensure to remove the &quot;CommentOnGitHub&quot; tag <u>if no action is required</u> for the work item.</p></div>" as $description |
            [
              {"op": "add", "path": "/fields/System.Title",       "value": $title},
              {"op": "add", "path": "/fields/System.Description", "value": $description},
              {"op": "add", "path": "/fields/System.AreaPath",    "value": $areaPath},
              {"op": "add", "path": "/fields/System.Tags",        "value": "CommentOnGitHub"}
            ]')

          if [[ "$WORK_ITEM_TYPE" == "Customer%20Escalation" ]]; then
            PATCH_DOC=$(echo "$PATCH_DOC" | jq '. + [
              {"op": "add", "path": "/fields/Custom.EscalationPriority", "value": "Priority 3 - Medium"},
              {"op": "add", "path": "/fields/Custom.Requestor",          "value": "Semi BU"},
              {"op": "add", "path": "/fields/Custom.BUAffinity",         "value": "Semi/Elec"}
            ]')
          fi

          if [[ "$WORK_ITEM_TYPE" == "Bug" ]]; then
            STS_VERSION=$(echo "$ISSUE_BODY" | sed -n '/System Setup/,$p' | grep -oP '(?<=STS Software Version )\d+\.\d+(\.\w+)?' | head -n 1 | tr -d '\r')
            if [[ -n "$STS_VERSION" ]]; then
              REPORTED_IN="STS Software Bundle $STS_VERSION"
            else
              REPORTED_IN="STS Software Bundle"
            fi
            echo "Extracted STS Software Version: $STS_VERSION"
            echo "Final ReportedIn value: $REPORTED_IN"
            PATCH_DOC=$(echo "$PATCH_DOC" | jq --arg reportedIn "$REPORTED_IN" '. + [
              {"op": "add", "path": "/fields/Custom.ReportedIn", "value": $reportedIn}
            ]')
          fi

          echo "$PATCH_DOC" > patch.json

          WORK_ITEM_API_URL="https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_apis/wit/workitems/\$${WORK_ITEM_TYPE}?api-version=6.0"
          echo "Work Item API URL: $WORK_ITEM_API_URL"

          RESPONSE=$(curl -s -u :$AZURE_DEVOPS_TOKEN \
            -X POST \
            -H "Content-Type: application/json-patch+json" \
            --data @patch.json \
            "$WORK_ITEM_API_URL")

          WORK_ITEM_ID=$(echo "$RESPONSE" | jq -r '.id')
          if [ "$WORK_ITEM_ID" = "null" ]; then
            echo "Error: Work item creation failed."
            exit 1
          fi

          WORK_ITEM_URL="https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_workitems/edit/$WORK_ITEM_ID"
          echo "work_item_id=$WORK_ITEM_ID" >> $GITHUB_OUTPUT
          echo "work_item_url=$WORK_ITEM_URL" >> $GITHUB_OUTPUT
          printf '%s' "$FORMATTED_ISSUE_BODY" > formatted_body.txt

      - name: Upload Images and Update Work Item Description
        env:
          AZDO_ORG: ${{ secrets.AZDO_ORG }}
          AZDO_PROJECT: ${{ secrets.AZDO_PROJECT }}
          AZURE_DEVOPS_TOKEN: ${{ secrets.AZURE_DEVOPS_TOKEN }}
          WORK_ITEM_ID: ${{ steps.create-work-item.outputs.work_item_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          echo "Processing images for Work Item #$WORK_ITEM_ID"

          # Write the image-processing logic to a standalone Python script.
          # This avoids nested PYEOF heredoc conflicts and shell interpolation inside Python.
          cat << 'IMG_SCRIPT_EOF' > /tmp/process_image.py
          import sys, re, subprocess, html
          from PIL import Image

          MAGIC_SIGNATURES = [
              (b'\xff\xd8\xff',      'JPEG'),
              (b'\x89PNG\r\n\x1a\n', 'PNG'),
              (b'GIF87a',             'GIF'),
              (b'GIF89a',             'GIF'),
              (b'RIFF',               'WEBP'),
              (b'BM',                 'BMP'),
              (b'II\x2a\x00',        'TIFF'),
              (b'MM\x00\x2a',        'TIFF'),
              # SVG is explicitly NOT in this list — it can contain <script> tags
          ]

          def fallback_link(src, alt):
              safe_src = html.escape(src, quote=True)
              safe_alt = html.escape(alt)
              return f'<a href="{safe_src}">[Image: {safe_alt}]</a>'

          def replace_placeholder(src, alt, replacement):
              content = open('formatted_body.txt').read()
              placeholder = f'__IMG_PLACEHOLDER__{src}__ALT__{alt}__END__'
              open('formatted_body.txt', 'w').write(content.replace(placeholder, replacement))

          def check_magic_bytes(img_file):
              with open(img_file, 'rb') as f:
                  header = f.read(16)
              # Explicitly reject SVG (starts with XML or <svg)
              try:
                  text_header = header.decode('utf-8', errors='ignore').lstrip()
                  if text_header.startswith('<?xml') or text_header.lower().startswith('<svg'):
                      print('SVG rejected: contains potential script content', file=sys.stderr)
                      return None
              except Exception:
                  pass
              for sig, fmt in MAGIC_SIGNATURES:
                  if header[:len(sig)] == sig:
                      if fmt == 'WEBP' and header[8:12] != b'WEBP':
                          continue
                      return fmt
              return None

          def validate_pil(img_file):
              Image.MAX_IMAGE_PIXELS = 50000000
              allowed = ['JPEG', 'PNG', 'GIF', 'WEBP', 'BMP', 'TIFF']
              img = Image.open(img_file)
              img.load()
              if img.format not in allowed:
                  raise ValueError(f'Rejected format: {img.format}')
              return img.format, img.size

          # Args: action src alt [img_file] [attachment_url]
          action     = sys.argv[1]
          src        = sys.argv[2]
          alt        = sys.argv[3]
          img_file   = sys.argv[4] if len(sys.argv) > 4 else None
          attach_url = sys.argv[5] if len(sys.argv) > 5 else None

          if action == 'fallback':
              replace_placeholder(src, alt, fallback_link(src, alt))

          elif action == 'magic':
              fmt = check_magic_bytes(img_file)
              if not fmt:
                  with open(img_file, 'rb') as f:
                      header = f.read(8)
                  print(f'Magic bytes rejected: {header.hex()}', file=sys.stderr)
                  replace_placeholder(src, alt, fallback_link(src, alt))
                  sys.exit(1)
              print(f'Magic bytes OK: {fmt}')

          elif action == 'pil':
              try:
                  fmt, size = validate_pil(img_file)
                  print(f'PIL OK: {fmt} {size}')
              except Exception as e:
                  print(f'PIL rejected: {e}', file=sys.stderr)
                  replace_placeholder(src, alt, fallback_link(src, alt))
                  sys.exit(1)

          elif action == 'embed':
              safe_url = html.escape(attach_url, quote=True)
              safe_alt = html.escape(alt)
              replacement = f'<img src="{safe_url}" alt="{safe_alt}" style="max-width:100%;" />'
              replace_placeholder(src, alt, replacement)
              print(f'Embedded image: {attach_url}')
          IMG_SCRIPT_EOF

          IMG_INDEX=0
          echo "0" > /tmp/img_index.txt

          # Extract all placeholders from the body file and process each
          grep -oP '__IMG_PLACEHOLDER__\K.+?(?=__END__)' formatted_body.txt > /tmp/img_tokens.txt || true

          while IFS= read -r token; do

            SRC=$(echo "$token" | grep -oP '^.+?(?=__ALT__)')
            ALT=$(echo "$token" | sed 's/.*__ALT__//')

            if [[ -z "$SRC" ]]; then
              echo "Could not parse placeholder token, skipping"
              continue
            fi

            IMG_INDEX=$((IMG_INDEX + 1))
            echo "$IMG_INDEX" > /tmp/img_index.txt
            IMG_FILE="image_$IMG_INDEX.png"
            echo "--- Image $IMG_INDEX: $SRC (alt: $ALT)"

            # 1. Block internal/private URLs (SSRF) — also decode percent-encoding to catch bypasses
            DECODED_SRC=$(python3 -c "import sys, urllib.parse; print(urllib.parse.unquote(sys.argv[1]))" "$SRC")
            if echo "$DECODED_SRC" | grep -qP '^https?://(169\.254\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.|0\.0\.0\.0|localhost)'; then
              echo "BLOCKED: internal URL"
              python3 /tmp/process_image.py fallback "$SRC" "$ALT"
              continue
            fi

            # 2. Block dangerous URL schemes (also on decoded URL)
            if echo "$DECODED_SRC" | grep -qiP '^(javascript|data|vbscript|file|blob)\s*:'; then
              echo "BLOCKED: dangerous URL scheme"
              python3 /tmp/process_image.py fallback "$SRC" "$ALT"
              continue
            fi

            # 3. Download - no redirects allowed (--max-redirs 0) to prevent open-redirect SSRF.
            # We resolve the final IP ourselves and re-validate it before downloading.
            echo "Resolving host for $SRC..."
            IMG_HOST=$(python3 -c "import sys, urllib.parse; print(urllib.parse.urlparse(sys.argv[1]).hostname or '')" "$SRC")
            RESOLVED_IP=$(getent hosts "$IMG_HOST" 2>/dev/null | awk '{print $1}' | head -1)
            echo "Resolved IP: $RESOLVED_IP"
            if [[ -n "$RESOLVED_IP" ]]; then
              if echo "$RESOLVED_IP" | grep -qP '^(169\.254\.|10\.|192\.168\.|172\.(1[6-9]|2[0-9]|3[01])\.|127\.|0\.0\.0\.0)'; then
                echo "BLOCKED: resolved IP is internal ($RESOLVED_IP)"
                python3 /tmp/process_image.py fallback "$SRC" "$ALT"
                continue
              fi
            fi

            # 3b. Download with size limit (10MB) - follow redirects (-L), then check magic bytes
            # NOTE: We skip the HEAD Content-Type pre-check because GitHub image URLs redirect
            # and may return application/octet-stream on HEAD requests, causing false negatives.
            # Magic-byte and PIL validation (steps 4 & 5) are sufficient to reject non-images.
            echo "Downloading image $IMG_INDEX..."
            HTTP_STATUS=$(curl -sL --max-time 30 -o "$IMG_FILE" -w "%{http_code}" --max-filesize 10485760 \
              -H "User-Agent: Mozilla/5.0" \
              "$SRC")
            echo "HTTP status: $HTTP_STATUS, file size: $(stat -c%s "$IMG_FILE" 2>/dev/null || echo 0) bytes"

            if [[ "$HTTP_STATUS" != "200" ]] || [[ ! -s "$IMG_FILE" ]]; then
              echo "FAILED: download failed (HTTP $HTTP_STATUS)"
              python3 /tmp/process_image.py fallback "$SRC" "$ALT"
              continue
            fi

            # 4. Magic bytes check
            echo "Checking magic bytes..."
            if ! python3 /tmp/process_image.py magic "$SRC" "$ALT" "$IMG_FILE"; then
              echo "FAILED: magic bytes check"
              continue  # process_image.py already wrote fallback
            fi

            # 5. PIL format + decompression bomb check
            echo "Running PIL validation..."
            if ! python3 /tmp/process_image.py pil "$SRC" "$ALT" "$IMG_FILE"; then
              echo "FAILED: PIL validation"
              continue  # process_image.py already wrote fallback
            fi

            # 6. Upload to AzDO
            echo "Uploading image $IMG_INDEX to AzDO..."
            UPLOAD_RESPONSE=$(curl -s -u :$AZURE_DEVOPS_TOKEN \
              -X POST \
              -H "Content-Type: application/octet-stream" \
              --data-binary @"$IMG_FILE" \
              "https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_apis/wit/attachments?fileName=$IMG_FILE&api-version=6.0")

            ATTACHMENT_URL=$(echo "$UPLOAD_RESPONSE" | jq -r '.url // empty')
            echo "Attachment URL: $ATTACHMENT_URL"

            if [[ -n "$ATTACHMENT_URL" ]]; then
              echo "SUCCESS: image $IMG_INDEX uploaded"
              python3 /tmp/process_image.py embed "$SRC" "$ALT" "$IMG_FILE" "$ATTACHMENT_URL"
            else
              echo "FAILED: AzDO upload failed, using link fallback"
              echo "Upload response: $UPLOAD_RESPONSE"
              python3 /tmp/process_image.py fallback "$SRC" "$ALT"
            fi

          done < /tmp/img_tokens.txt

          IMG_INDEX=$(cat /tmp/img_index.txt 2>/dev/null || echo 0)

          UPDATED_DESCRIPTION=$(cat formatted_body.txt)
          echo "Image processing complete. Processed $IMG_INDEX image(s)."


          UPDATE_PATCH=$(jq -n \
            --arg issueNumber "$ISSUE_NUMBER" \
            --arg issueUrl "$ISSUE_URL" \
            --arg bodyHtml "$UPDATED_DESCRIPTION" \
            '"<div><p><strong>ISSUE DETAILS:</strong></p><p>Issue Number: \($issueNumber)</p><p><a href=\"\($issueUrl)\">View Issue on GitHub</a></p><div>\($bodyHtml)</div><p style=\"color:red;\"><strong>NOTE:</strong> Please ensure to remove the &quot;CommentOnGitHub&quot; tag <u>if no action is required</u> for the work item.</p></div>" as $description |
            [{"op": "replace", "path": "/fields/System.Description", "value": $description}]')

          echo "$UPDATE_PATCH" > patch-update.json

          UPDATE_RESPONSE=$(curl -s -u :$AZURE_DEVOPS_TOKEN \
            -X PATCH \
            -H "Content-Type: application/json-patch+json" \
            --data @patch-update.json \
            "https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_apis/wit/workitems/$WORK_ITEM_ID?api-version=6.0")

          if echo "$UPDATE_RESPONSE" | jq -e '.id' > /dev/null; then
            echo "Work item description updated with $IMG_INDEX image(s)"
          else
            echo "Failed to update work item description"
            echo "Response: $UPDATE_RESPONSE"
            exit 1
          fi

      - name: Link GitHub Issue to Azure DevOps Work Item
        env:
          AZDO_ORG: ${{ secrets.AZDO_ORG }}
          AZDO_PROJECT: ${{ secrets.AZDO_PROJECT }}
          AZURE_DEVOPS_TOKEN: ${{ secrets.AZURE_DEVOPS_TOKEN }}
          WORK_ITEM_ID: ${{ steps.create-work-item.outputs.work_item_id }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          GH_REPO_GUID: ${{ secrets.GH_REPO_GUID }}
        run: |
          echo "Linking GitHub Issue to the Azure DevOps Work Item"
          PATCH_RELATION=$(jq -n \
            --arg issueNumber "$ISSUE_NUMBER" \
            --arg repoGuid "$GH_REPO_GUID" \
            '[{"op": "add", "path": "/relations/-", "value": {
              "rel": "ArtifactLink",
              "url": "vstfs:///GitHub/Issue/\($repoGuid)%2F\($issueNumber)",
              "attributes": {"name": "GitHub Issue"}
            }}]')
          echo "$PATCH_RELATION" > patch-relation.json
          WORK_ITEM_API_URL="https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_apis/wit/workitems/$WORK_ITEM_ID?api-version=6.0"
          RESPONSE=$(curl -s -u :$AZURE_DEVOPS_TOKEN \
            -X PATCH \
            -H "Content-Type: application/json-patch+json" \
            --data @patch-relation.json \
            "$WORK_ITEM_API_URL")

      - name: Add comment on GitHub Issue
        uses: actions/github-script@v6
        env:
          WORK_ITEM_ID: ${{ steps.create-work-item.outputs.work_item_id }}
          WORK_ITEM_URL: ${{ steps.create-work-item.outputs.work_item_url }}
        with:
          script: |
            const issueNumber = context.payload.issue.number;
            const issueCreator = context.payload.issue.user.login;
            const workItemId = process.env.WORK_ITEM_ID;
            const workItemUrl = process.env.WORK_ITEM_URL;
            const commentBody = `Thank you for posting, **@${issueCreator}**! The NI development team has been notified and a corresponding work item has been created internally. **Azure DevOps Work Item:** [#${workItemId}](${workItemUrl}) The team will review and reply back if any further clarification is required.`;
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issueNumber,
              body: commentBody,
            });

      - name: Send Teams Notification
        env:
          TEAMS_WEBHOOK_URL: ${{ secrets.TEAMS_WEBHOOK_URL }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          ISSUE_BODY: ${{ github.event.issue.body }}
          WORK_ITEM_ID: ${{ steps.create-work-item.outputs.work_item_id }}
          WORK_ITEM_URL: ${{ steps.create-work-item.outputs.work_item_url }}
          WORK_ITEM_TYPE: ${{ steps.determine-work-item-type.outputs.display_type }}
        run: |
          CLEAN_TITLE=$(echo "$ISSUE_TITLE" | sed -E 's/\s*\[AzDO Work Item:[^\]]*\]//g' | sed 's/^[[:space:]]*//;s/[[:space:]]*$//')

          # Write body to file so Python can read it safely (avoids env var quoting issues)
          printf '%s' "$ISSUE_BODY" > /tmp/teams_body.txt
          printf '%s' "$CLEAN_TITLE" > /tmp/teams_title.txt

          python3 << 'PYEOF'
          import re, os, json

          with open("/tmp/teams_body.txt", "r") as f:
              body = f.read()

          # Extract image URLs — handles both markdown ![alt](url) and HTML <img src="url">
          markdown_imgs = re.findall(r'!\[.*?\]\((https?://[^)]+)\)', body)
          html_imgs = re.findall(r'<img[^>]+src=["\']?(https?://[^"\'>\s]+)["\']?', body, re.IGNORECASE)

          # Combine, deduplicate, limit to 3
          seen = set()
          images = []
          for url in markdown_imgs + html_imgs:
              if url not in seen:
                  seen.add(url)
                  images.append(url)
              if len(images) == 3:
                  break

          with open("/tmp/teams_images.json", "w") as f:
              json.dump(images, f)

          # Convert ## headings to **bold**
          body = re.sub(r'^#{1,6}\s+(.+)$', r'**\1**', body, flags=re.MULTILINE)

          # Convert unordered list markers to bullets
          body = re.sub(r'^[-*]\s+(?!\*)', '• ', body, flags=re.MULTILINE)

          # Remove markdown images from body text
          body = re.sub(r'!\[.*?\]\(.*?\)', '', body)

          # Remove HTML tags
          body = re.sub(r'<[^>]+>', '', body)

          # Collapse 3+ newlines to 2
          body = re.sub(r'\n{3,}', '\n\n', body).strip()

          # Truncate at word boundary
          if len(body) > 1500:
              truncated = body[:1500].rsplit(None, 1)[0]
              body = truncated + "...\n\n*(truncated — view full issue for more details)*"

          with open("/tmp/teams_body_clean.txt", "w") as f:
              f.write(body)
          PYEOF

          export CLEAN_TITLE ISSUE_URL ISSUE_NUMBER WORK_ITEM_ID WORK_ITEM_URL WORK_ITEM_TYPE

          # Build the complete card body array with images inline
          CARD_BODY=$(python3 << 'PYEOF'
          import json, re, os

          with open("/tmp/teams_body.txt", "r") as f:
              body = f.read()

          issue_title    = os.environ.get("CLEAN_TITLE", "")
          issue_url      = os.environ.get("ISSUE_URL", "")
          issue_number   = os.environ.get("ISSUE_NUMBER", "")
          work_item_id   = os.environ.get("WORK_ITEM_ID", "")
          work_item_url  = os.environ.get("WORK_ITEM_URL", "")
          work_item_type = os.environ.get("WORK_ITEM_TYPE", "")

          def clean_text(text):
              text = re.sub(r'^#{1,6}\s+(.+)$', r'**\1**', text, flags=re.MULTILINE)
              text = re.sub(r'^[-*]\s+(?!\*)', '• ', text, flags=re.MULTILINE)
              text = re.sub(r'<[^>]+>', '', text)
              text = re.sub(r'\n{3,}', '\n\n', text)
              return text.strip()

          def make_text_block(text, spacing="None"):
              return {
                  "type": "TextBlock",
                  "text": text,
                  "wrap": True,
                  "markdown": True,
                  "spacing": spacing
              }

          def make_image_block(url):
              return {
                  "type": "Image",
                  "url": url,
                  "size": "Large",
                  "msTeams": {"allowExpand": True}
              }

          image_pattern = re.compile(
              r'(!\[.*?\]\((https?://[^)]+)\)|<img[^>]+src=["\']?(https?://[^"\'>\s]+)["\']?[^>]*>)',
              re.IGNORECASE
          )

          # Build header blocks
          blocks = [
              {
                  "type": "TextBlock",
                  "text": f"**New GitHub Issue (#{issue_number}): {issue_title}**",
                  "wrap": True,
                  "size": "Medium"
              },
              {
                  "type": "TextBlock",
                  "text": f"**Title:** [{issue_title}]({issue_url})",
                  "wrap": True,
                  "spacing": "Medium"
              },
              {
                  "type": "TextBlock",
                  "text": f"**GitHub Issue URL:** [View Issue]({issue_url})",
                  "wrap": True,
                  "spacing": "None"
              },
              {
                  "type": "TextBlock",
                  "text": f"**Work Item ID:** [{work_item_id}]({work_item_url})",
                  "wrap": True,
                  "spacing": "None"
              },
              {
                  "type": "TextBlock",
                  "text": f"**Work Item Type:** {work_item_type}",
                  "wrap": True,
                  "spacing": "None"
              },
              {
                  "type": "TextBlock",
                  "text": "**Description:**",
                  "wrap": True,
                  "spacing": "Medium"
              }
          ]

          # Split the body around images and interleave TextBlocks and Image blocks
          pos = 0
          text_segments = []
          MAX_CHARS = 1500

          for match in image_pattern.finditer(body):
              text_before = body[pos:match.start()]
              text_segments.append(('text', text_before))
              url = match.group(2) or match.group(3)
              text_segments.append(('image', url))
              pos = match.end()

          text_segments.append(('text', body[pos:]))

          total_text_chars = 0
          truncated = False
          first_text_block = True

          for kind, content in text_segments:
              if kind == 'text':
                  cleaned = clean_text(content)
                  if not cleaned:
                      continue
                  if total_text_chars + len(cleaned) > MAX_CHARS and not truncated:
                      remaining = MAX_CHARS - total_text_chars
                      if remaining > 0:
                          cleaned = cleaned[:remaining].rsplit(None, 1)[0]
                          cleaned += "...\n\n*(truncated — view full issue for more details)*"
                      truncated = True
                  total_text_chars += len(cleaned)
                  spacing = "Medium" if first_text_block else "None"
                  blocks.append(make_text_block(cleaned, spacing))
                  first_text_block = False
                  if truncated:
                      break
              elif kind == 'image' and not truncated:
                  blocks.append(make_image_block(content))

          print(json.dumps(blocks))
          PYEOF
          )

          PAYLOAD=$(jq -n \
            --argjson cardBody "$CARD_BODY" \
            '{
              "type": "message",
              "attachments": [{
                "contentType": "application/vnd.microsoft.card.adaptive",
                "content": {
                  "$schema": "http://adaptivecards.io/schemas/adaptive-card.json",
                  "type": "AdaptiveCard",
                  "version": "1.4",
                  "body": $cardBody
                }
              }]
            }')

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST \
            -H "Content-Type: application/json" \
            --data "$PAYLOAD" \
            "$TEAMS_WEBHOOK_URL")

          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 202 ]; then
            echo "Failed to send Teams notification. HTTP status: $RESPONSE"
            exit 1
          fi

          echo "Teams notification sent successfully."

  sync-comment-to-azdo:
    if: >
      github.event_name == 'issue_comment' &&
      github.event.action == 'created' &&
      github.event.comment.user.login != 'github-actions[bot]' &&
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Extract Work Item ID from Issue Title
        id: extract-work-item
        uses: actions/github-script@v6
        with:
          script: |
            const issue = await github.rest.issues.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.issue.number
            });
            const match = issue.data.title.match(/\[AzDO Work Item:\s*(\d+)\]/);
            if (match) {
              console.log(`Found Work Item ID: ${match[1]}`);
              return match[1];
            }
            console.log('No Work Item ID found in issue title');
            return null;
          result-encoding: string

      - name: Sync comment to Azure DevOps
        if: steps.extract-work-item.outputs.result != 'null'
        env:
          AZDO_ORG: ${{ secrets.AZDO_ORG }}
          AZDO_PROJECT: ${{ secrets.AZDO_PROJECT }}
          AZURE_DEVOPS_TOKEN: ${{ secrets.AZURE_DEVOPS_TOKEN }}
          WORK_ITEM_ID: ${{ steps.extract-work-item.outputs.result }}
          COMMENT_USER: ${{ github.event.comment.user.login }}
          COMMENT_BODY: ${{ github.event.comment.body }}
          COMMENT_CREATED_AT: ${{ github.event.comment.created_at }}
          COMMENT_URL: ${{ github.event.comment.html_url }}
        run: |
          echo "Syncing comment to AzDO Work Item #$WORK_ITEM_ID"

          printf '%s' "$COMMENT_BODY" > /tmp/comment_body.md

          cat << 'PYEOF' > /tmp/convert_comment.py
          import re

          with open("/tmp/comment_body.md", "r") as f:
              raw = f.read()

          # Escape HTML special characters
          raw = raw.replace('&', '&amp;').replace('<', '&lt;').replace('>', '&gt;').replace('"', '&quot;')

          # Convert newlines to <br/>
          raw = raw.replace('\n', '<br/>')

          print(raw, end="")
          PYEOF

          ESCAPED_COMMENT_BODY=$(python3 /tmp/convert_comment.py)

          FORMATTED_COMMENT=$(jq -rn \
            --arg user "$COMMENT_USER" \
            --arg created_at "$COMMENT_CREATED_AT" \
            --arg url "$COMMENT_URL" \
            --arg body "$ESCAPED_COMMENT_BODY" \
            '"<div style=\"border-left: 3px solid #0078d4; padding: 10px; margin: 10px 0; background-color: #f3f4f6;\"><strong>GitHub Comment by @\($user)</strong><br/><em>\($created_at)</em><br/><a href=\"\($url)\">View on GitHub</a><br/><br/>\($body)</div>"')

          PATCH_DOC=$(jq -n \
            --arg comment "$FORMATTED_COMMENT" \
            '[{"op": "add", "path": "/fields/System.History", "value": $comment}]')

          echo "$PATCH_DOC" > patch-comment.json

          WORK_ITEM_API_URL="https://dev.azure.com/$AZDO_ORG/$AZDO_PROJECT/_apis/wit/workitems/$WORK_ITEM_ID?api-version=6.0"

          RESPONSE=$(curl -s -u :$AZURE_DEVOPS_TOKEN \
            -X PATCH \
            -H "Content-Type: application/json-patch+json" \
            --data @patch-comment.json \
            "$WORK_ITEM_API_URL")

          if echo "$RESPONSE" | jq -e '.id' > /dev/null; then
            echo "Comment synced to Work Item #$WORK_ITEM_ID"
          else
            echo "Failed to sync comment"
            echo "Response: $RESPONSE"
            exit 1
          fi